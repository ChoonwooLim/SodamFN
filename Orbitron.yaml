# Orbitron Deployment Configuration
# SodamFN Enterprise Management Platform
# Backend (FastAPI) + Admin Frontend (React) + Staff App (Cloudflare Pages)

project:
  name: sodam-fn
  region: ap-northeast-2  # Seoul

services:
  # ─────────────────────────────────────────────
  # Backend API (FastAPI + PostgreSQL)
  # ─────────────────────────────────────────────
  - name: sodam-backend
    type: web
    runtime: python
    rootDir: SodamApp/backend
    build:
      command: "pip install -r requirements.txt"
    start:
      command: "gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --timeout 300 --bind 0.0.0.0:$PORT"
    env:
      - key: DATABASE_URL
        from: database.sodam-db.connectionString
      - key: SECRET_KEY
        generate: true
      - key: FRONTEND_URL
        value: "https://sodamfn.twinverse.org"
      - key: STAFF_APP_URL
        value: "https://sodam-staff.pages.dev"
      - key: R2_ACCOUNT_ID
        value: ""  # Set via Orbitron secrets
      - key: R2_ACCESS_KEY_ID
        value: ""  # Set via Orbitron secrets
      - key: R2_SECRET_ACCESS_KEY
        value: ""  # Set via Orbitron secrets
      - key: R2_BUCKET_NAME
        value: "sodam-uploads"
      - key: R2_PUBLIC_URL
        value: ""  # Set after R2 bucket creation
      - key: REPLICATE_API_TOKEN
        value: ""  # Set via Orbitron secrets (Replicate.com API token for AI image generation)
      - key: AI_GPU_SERVER_URL
        value: "http://192.168.219.101:8100"  # Self-hosted GPU AI image generation
      - key: MEDIA_SERVER_URL
        value: "http://192.168.219.101:8200"  # Central media file server
      - key: MEDIA_API_KEY
        value: "sodam-media-2026"  # Media server API key
      - key: SUPERADMIN_USERNAME
        value: "superadmin"
      - key: SUPERADMIN_PASSWORD
        value: ""  # Set via Orbitron secrets
    healthCheck:
      path: /api/health
      interval: 30
    disk:
      name: sodam-uploads
      mountPath: /app/uploads
      sizeGB: 1

  # ─────────────────────────────────────────────
  # Admin Frontend (Vite + React)
  # ─────────────────────────────────────────────
  - name: sodam-frontend
    type: static
    rootDir: SodamApp/frontend
    build:
      command: "npm install && npm install terser -D && npm run build"
    publish: ./dist
    env:
      - key: VITE_API_URL
        value: "https://sodamfn.twinverse.org"
      - key: VITE_STAFF_APP_URL
        value: "https://sodam-staff.pages.dev"
      - key: VITE_MEDIA_URL
        value: "http://192.168.219.101:8200"
    routes:
      - source: "/*"
        rewrite: /index.html

# ─────────────────────────────────────────────
# Post-deploy: Staff App → Cloudflare Pages
# 재배포 시 자동으로 직원앱도 함께 빌드/배포
# ─────────────────────────────────────────────
postDeploy:
  - name: deploy-staff-app
    command: |
      cd SodamApp/staff-app
      npm install
      npm install terser -D
      npm run build
      npx wrangler pages deploy dist --project-name sodam-staff --branch main --commit-dirty=true --commit-message="Auto Deploy"
    env:
      - key: VITE_API_URL
        value: "https://sodamfn.twinverse.org"
      - key: VITE_MEDIA_URL
        value: "http://192.168.219.101:8200"

databases:
  - name: sodam-db
    engine: postgres
    region: ap-northeast-2
    plan: starter
