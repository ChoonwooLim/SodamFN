# Orbitron Deployment Configuration
# SodamFN Enterprise Management Platform
# Backend (FastAPI) + Admin Frontend (React) + Staff App (Cloudflare Pages)

project:
  name: sodam-fn
  region: ap-northeast-2  # Seoul

services:
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Backend API (FastAPI + PostgreSQL)
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  - name: sodam-backend
    type: web
    runtime: python
    rootDir: SodamApp/backend
    build:
      # WeasyPrint runtime deps (libpango/libcairo) + Korean fonts for м—°л§җм •мӮ° PDF
      command: |
        apt-get update && apt-get install -y \
          libpango-1.0-0 \
          libpangoft2-1.0-0 \
          libcairo2 \
          libgdk-pixbuf2.0-0 \
          libffi-dev \
          shared-mime-info \
          fonts-noto-cjk \
          fonts-noto-cjk-extra \
          && rm -rf /var/lib/apt/lists/*
        pip install -r requirements.txt
    start:
      command: "gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --timeout 300 --bind 0.0.0.0:$PORT"
    env:
      - key: DATABASE_URL
        value: "postgresql://devuser:devpass123@192.168.219.101:5432/sodamfn"
      - key: SECRET_KEY
        generate: true
      - key: FRONTEND_URL
        value: "https://sodamfn.twinverse.org"
      - key: STAFF_APP_URL
        value: "https://sodam-staff.pages.dev"
      - key: MEDIA_SERVER_URL
        value: "http://192.168.219.101:8200"
      - key: MEDIA_API_KEY
        value: "sodam-media-2026"
      - key: R2_ACCOUNT_ID
        value: ""  # Set via Orbitron secrets
      - key: R2_ACCESS_KEY_ID
        value: ""  # Set via Orbitron secrets
      - key: R2_SECRET_ACCESS_KEY
        value: ""  # Set via Orbitron secrets
      - key: R2_BUCKET_NAME
        value: "sodam-uploads"
      - key: R2_PUBLIC_URL
        value: ""  # Set after R2 bucket creation
      - key: REPLICATE_API_TOKEN
        value: ""  # Set via Orbitron secrets (Replicate.com API token for AI image generation)
      - key: OPENAI_API_KEY
        value: ""  # Set via Orbitron secrets (OpenAI DALL-E 3 final fallback)
      # Shared AI compute server: twinverse-ai @ 192.168.219.117 (RTX 3090 24GB)
      # See C:\WORK\infra-docs\ai-shared-registry.md for full policy
      - key: AI_GPU_SERVER_URL
        value: "http://192.168.219.117:8100"  # Flux.1-schnell + Real-ESRGAN + rembg + LaMa
      - key: OLLAMA_URL
        value: "http://192.168.219.117:11434"  # Ollama LLM (qwen2.5/mistral/llava)
      - key: TTS_SERVER_URL
        value: "http://192.168.219.117:8101"  # TTS (Edge-TTS / XTTS v2) - reserved
      - key: MUSIC_SERVER_URL
        value: "http://192.168.219.117:8102"  # Music generation (ACE-Step) - reserved
      - key: MEDIA_SERVER_URL
        value: "http://192.168.219.101:8200"  # Central media file server
      - key: MEDIA_API_KEY
        value: "sodam-media-2026"  # Media server API key
      - key: SUPERADMIN_USERNAME
        value: "superadmin"
      - key: SUPERADMIN_PASSWORD
        value: "admin1234"
      # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # Popbill FAX (2026-04-24 н…ҢмҠӨнҠё нҷҳкІҪ м—°лҸҷ)
      # SecretKeyлҠ” Orbitron SecretsлЎң м„Өм • вҖ” YAMLм—җ мӢӨм ң к°’ кёҲм§Җ
      # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - key: FAX_PROVIDER
        value: "popbill"
      - key: POPBILL_LINK_ID
        value: "SODAM"
      - key: POPBILL_SECRET_KEY
        value: ""  # вҡ пёҸ Orbitron Secretsм—җ м„Өм •
      - key: POPBILL_CORP_NUM
        value: "6391201514"
      - key: POPBILL_SENDER_NUMBER
        value: "0224526570"
      - key: POPBILL_IS_TEST
        value: "true"
      - key: POPBILL_USER_ID
        value: "sodam2025"  # мқјл°ҳнҡҢмӣҗ ID вҖ” popbill-url л°ңкёү/нҡҢмӣҗ мӢқлі„ нҳём¶ңм—җ н•„мҡ”
      - key: NOTIFICATION_PROVIDER
        value: "popbill"  # SMS/м№ҙм№ҙмҳӨ м•ҢлҰјнҶЎ нҷңм„ұ. stub мңјлЎң нҶ кёҖн•ҳл©ҙ лЎңк·ёл§Ң лӮЁкі  лҜёл°ңмҶЎ
      # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # Popbill кі„мўҢмЎ°нҡҢ (EasyFinBank)
      # 2026-04-27 нҳ„мһ¬: TEST нҷҳкІҪмңјлЎң кІҖмҰқ м§„н–ү мӨ‘ (LIVE -99010016 м°ЁлӢЁ мң м§Җ)
      # TEST л“ұлЎқкі„мўҢ: мӢ н•ң 110-357-7***** мӮ¬мҡ©кё°к°„ 2026-04-27 ~ 2026-06-04
      # кІҖмҰқ мҷ„лЈҢ нӣ„ LIVE нҷңм„ұнҷ”лҗҳл©ҙ "false" лЎң нҶ кёҖ + кі„мўҢ мһ¬л“ұлЎқ н•„мҡ”
      # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - key: POPBILL_BANK_IS_TEST
        value: "true"
      - key: BANK_SYNC_PROVIDER
        value: ""  # л№Ҳк°’ = мһҗлҸҷ(LINK_ID/SECRET_KEY мһҲмңјл©ҙ popbill, м—Ҷмңјл©ҙ stub)
      # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      # CODEF (л§ҲмқҙлҚ°мқҙн„° нҶөн•©) вҖ” 2026-04-29 лҚ°лӘЁлІ„м „ л°ңкёү
      # нҷҳкІҪ м „нҷҳ: CODEF_ENV + CODEF_API_HOST + CLIENT_ID/SECRET лҸҷмӢң көҗмІҙ
      #   - demo: https://development.codef.io (1к°ңмӣ” н•ҳлЈЁ 100нҡҢ)
      #   - production: https://api.codef.io (м •мӢқлІ„м „, лі„лҸ„ мӢ мІӯ)
      # CLIENT_ID/SECRET/PUBLIC_KEYлҠ” Orbitron SecretsлЎң л“ұлЎқ вҖ” YAML мӢӨм ң к°’ кёҲм§Җ
      # лҸ„нҒҗлЁјнҠё: C:/WORK/llm-wiki/40-Tools/CODEF.md SSOT
      # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - key: CODEF_ENV
        value: "demo"
      - key: CODEF_API_HOST
        value: "https://development.codef.io"
      - key: CODEF_CLIENT_ID
        value: ""  # вҡ пёҸ Orbitron Secretsм—җ м„Өм •
      - key: CODEF_CLIENT_SECRET
        value: ""  # вҡ пёҸ Orbitron Secretsм—җ м„Өм •
      - key: CODEF_PUBLIC_KEY
        value: ""  # вҡ пёҸ Orbitron Secretsм—җ м„Өм • (кі„м • RSA кіөк°ңнӮӨ, нҷҳкІҪ л¬ҙкҙҖ кіөнҶө)
    healthCheck:
      path: /api/health
      interval: 30
    disk:
      name: sodam-uploads
      mountPath: /app/uploads
      sizeGB: 1

  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Admin Frontend (Vite + React)
  # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  - name: sodam-frontend
    type: static
    rootDir: SodamApp/frontend
    build:
      command: "npm install && npm run build"
    publish: ./dist
    env:
      - key: VITE_API_URL
        value: "https://sodamfn.twinverse.org"
      - key: VITE_STAFF_APP_URL
        value: "https://sodam-staff.pages.dev"
      - key: VITE_MEDIA_URL
        value: "http://192.168.219.101:8200"
    routes:
      - source: "/*"
        rewrite: /index.html
    headers:
      # HTML/лЈЁнҠё: н•ӯмғҒ м„ңлІ„ мһ¬нҷ•мқё вҶ’ мғҲлЎңкі м№Ё м—Ҷмқҙ мөңмӢ  л°ҳмҳҒ
      - source: "/**"
        headers:
          - key: Cache-Control
            value: "public, max-age=0, must-revalidate"
      # н•ҙмӢң нҸ¬н•Ё л№Ңл“ң мӮ°м¶ңл¬ј: 1л…„ immutable мәҗмӢң
      - source: "/assets/**"
        headers:
          - key: Cache-Control
            value: "public, max-age=31536000, immutable"

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Post-deploy: Staff App вҶ’ Cloudflare Pages
# мһ¬л°°нҸ¬ мӢң мһҗлҸҷмңјлЎң м§Ғмӣҗм•ұлҸ„ н•Ёк»ҳ л№Ңл“ң/л°°нҸ¬
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
postDeploy:
  - name: deploy-staff-app
    command: |
      cd SodamApp/staff-app
      npm install
      npm run build
      npx wrangler pages deploy dist --project-name sodam-staff --branch main --commit-dirty=true --commit-message="Auto Deploy"
    env:
      - key: VITE_API_URL
        value: "https://sodamfn.twinverse.org"
      - key: VITE_MEDIA_URL
        value: "http://192.168.219.101:8200"

# Database: лЎңм»¬ PostgreSQL м§Ғм ‘ м—°кІ° (192.168.219.101:5432/sodamfn)
# Orbitron кҙҖлҰ¬нҳ• DB лҢҖмӢ  кё°мЎҙ PostgreSQL м„ңлІ„ мӮ¬мҡ©
