# Orbitron Deployment Configuration
# SodamFN Enterprise Management Platform
# Backend (FastAPI) + Admin Frontend (React) + Staff App (Cloudflare Pages)

project:
  name: sodam-fn
  region: ap-northeast-2  # Seoul

services:
  # ─────────────────────────────────────────────
  # Backend API (FastAPI + PostgreSQL)
  # ─────────────────────────────────────────────
  - name: sodam-backend
    type: web
    runtime: python
    rootDir: SodamApp/backend
    build:
      # WeasyPrint runtime deps (libpango/libcairo) + Korean fonts for 연말정산 PDF
      command: |
        apt-get update && apt-get install -y \
          libpango-1.0-0 \
          libpangoft2-1.0-0 \
          libcairo2 \
          libgdk-pixbuf2.0-0 \
          libffi-dev \
          shared-mime-info \
          fonts-noto-cjk \
          fonts-noto-cjk-extra \
          && rm -rf /var/lib/apt/lists/*
        pip install -r requirements.txt
    start:
      command: "gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --timeout 300 --bind 0.0.0.0:$PORT"
    env:
      - key: DATABASE_URL
        value: "postgresql://devuser:devpass123@192.168.219.101:5432/sodamfn"
      - key: SECRET_KEY
        generate: true
      - key: FRONTEND_URL
        value: "https://sodamfn.twinverse.org"
      - key: STAFF_APP_URL
        value: "https://sodam-staff.pages.dev"
      - key: MEDIA_SERVER_URL
        value: "http://192.168.219.101:8200"
      - key: MEDIA_API_KEY
        value: "sodam-media-2026"
      - key: R2_ACCOUNT_ID
        value: ""  # Set via Orbitron secrets
      - key: R2_ACCESS_KEY_ID
        value: ""  # Set via Orbitron secrets
      - key: R2_SECRET_ACCESS_KEY
        value: ""  # Set via Orbitron secrets
      - key: R2_BUCKET_NAME
        value: "sodam-uploads"
      - key: R2_PUBLIC_URL
        value: ""  # Set after R2 bucket creation
      # ─────────────────────────────────────────────
      # AI 이미지 파이프라인 (2026-05-01 — 외부 API 전면 제거 → OpenClaw + 자체 Flux)
      # 프롬프트 엔지니어링: OpenClaw GPT-5.5 (ChatGPT Plus/Pro OAuth)
      # 이미지 생성: 작업PC RTX 3090 — FLUX.1-schnell + Real-ESRGAN + rembg + LaMa
      # ─────────────────────────────────────────────
      - key: AI_FLUX_BASE_URL
        value: "http://192.168.219.100:8100"  # 작업PC GPU 서버 (D:\SodamAI\image-service)
      - key: AI_GPU_SERVER_URL
        value: "http://192.168.219.100:8100"  # 레거시 호환 (promotions.py 등)
      - key: OPENCLAW_GATEWAY_URL
        value: "http://192.168.219.117:18790"  # twinverse-ai socat 프록시 → 127.0.0.1:18789
      - key: OPENCLAW_GATEWAY_TOKEN
        value: ""  # ⚠️ Orbitron Secrets에 설정 (gateway.auth.token from openclaw.json)
      - key: OPENCLAW_MODEL
        value: "openclaw/codex-pro"  # GPT-5.5 agent
      # Shared AI compute server: twinverse-ai @ 192.168.219.117
      # See C:\WORK\infra-docs\ai-shared-registry.md for full policy
      - key: OLLAMA_URL
        value: "http://192.168.219.117:11434"  # Ollama LLM (qwen2.5/mistral/llava)
      # bank-sync AI 분류 (Phase 1, 2026-05-12)
      - key: AI_CLASSIFY_PROVIDER
        value: "ollama"  # ollama (default) | openclaw (fallback, 미구현)
      - key: OLLAMA_CLASSIFY_MODEL
        value: "qwen2.5:7b"  # PSU 안정 범위 (14b는 크래시 위험)
      - key: AI_CLASSIFY_TIMEOUT_SEC
        value: "30"
      # 이동식 단말기 카드매출 (코페이 등) 수수료율 — 매출 역산용
      - key: KOPAY_COMMISSION_RATE
        value: "0.0275"  # 2.75% (코페이 정산 명세 기준 조정 가능)
      - key: TTS_SERVER_URL
        value: "http://192.168.219.117:8101"  # TTS (Edge-TTS / XTTS v2) - reserved
      - key: MUSIC_SERVER_URL
        value: "http://192.168.219.117:8102"  # Music generation (ACE-Step) - reserved
      - key: MEDIA_SERVER_URL
        value: "http://192.168.219.101:8200"  # Central media file server
      - key: MEDIA_API_KEY
        value: "sodam-media-2026"  # Media server API key
      - key: SUPERADMIN_USERNAME
        value: "superadmin"
      - key: SUPERADMIN_PASSWORD
        value: "admin1234"
      # ─────────────────────────────────────────────
      # Popbill FAX (2026-04-24 테스트 환경 연동)
      # SecretKey는 Orbitron Secrets로 설정 — YAML에 실제 값 금지
      # ─────────────────────────────────────────────
      - key: FAX_PROVIDER
        value: "popbill"
      - key: POPBILL_LINK_ID
        value: "SODAM"
      - key: POPBILL_SECRET_KEY
        value: ""  # ⚠️ Orbitron Secrets에 설정
      - key: POPBILL_CORP_NUM
        value: "6391201514"
      - key: POPBILL_SENDER_NUMBER
        value: "0224526570"
      - key: POPBILL_IS_TEST
        value: "false"  # 2026-06-23 정식(LIVE) 운영 — 팩스/현금영수증/세금계산서/홈택스/계좌확인 실 발행·수집
      - key: POPBILL_USER_ID
        value: "sodam2025"  # 일반회원 ID — popbill-url 발급/회원 식별 호출에 필요
      - key: NOTIFICATION_PROVIDER
        value: "popbill"  # SMS/카카오 알림톡 활성. stub 으로 토글하면 로그만 남고 미발송
      # ─────────────────────────────────────────────
      # Popbill 계좌조회 (EasyFinBank) — 2026-06-23 정식(LIVE) 운영 전환 완료
      # ※ TEST→LIVE 전환 시 실계좌 재등록 필요(테스트 계좌는 LIVE 미인계)
      # ─────────────────────────────────────────────
      - key: POPBILL_BANK_IS_TEST
        value: "false"
      - key: BANK_SYNC_PROVIDER
        value: "popbill"  # 계좌조회 메인 = 팝빌(EasyFinBank). CODEF 는 보조(과거내역 보강·한도 우회)
      # ─────────────────────────────────────────────
      # CODEF (마이데이터 통합) — 2026-04-29 데모버전 발급
      # 환경 전환: CODEF_ENV + CODEF_API_HOST + CLIENT_ID/SECRET 동시 교체
      #   - demo: https://development.codef.io (1개월 하루 100회)
      #   - production: https://api.codef.io (정식버전, 별도 신청)
      # CLIENT_ID/SECRET/PUBLIC_KEY는 Orbitron Secrets로 등록 — YAML 실제 값 금지
      # 도큐먼트: C:/WORK/llm-wiki/40-Tools/CODEF.md SSOT
      # ─────────────────────────────────────────────
      - key: CODEF_ENV
        value: "demo"
      - key: CODEF_API_HOST
        value: "https://development.codef.io"
      - key: CODEF_CLIENT_ID
        value: ""  # ⚠️ Orbitron Secrets에 설정
      - key: CODEF_CLIENT_SECRET
        value: ""  # ⚠️ Orbitron Secrets에 설정
      - key: CODEF_PUBLIC_KEY
        value: ""  # ⚠️ Orbitron Secrets에 설정 (계정 RSA 공개키, 환경 무관 공통)
      # ─────────────────────────────────────────────
      # CODEF Phase 1 — 운영 (cron + 한도 + 알림톡)
      # ─────────────────────────────────────────────
      - key: CRON_SHARED_SECRET
        value: ""  # ⚠️ Orbitron Secrets에 32자 random (cron 엔드포인트 인증)
      - key: CODEF_PRICE_TABLE
        value: "{}"  # API별 단가 JSON, DEMO=빈, PRODUCT 견적 후 갱신
      - key: CODEF_DEMO_DAILY_LIMIT
        value: "100"
      - key: NOTIFICATION_TEMPLATE_CODEF_EXPIRED
        value: ""  # ⚠️ 팝빌 알림톡 검수 후 templateCode 등록
      # ─────────────────────────────────────────────
      # EasyPOS (KICC smart.easypos.net) — POS 매출 자동수집
      # Fernet 마스터 키 — 이지포스 비밀번호 DB 보관용 대칭 암호화.
      # ⚠️ 변경 시 기존 자격증명 복호 불가 → 사장님 재입력 필요.
      # ─────────────────────────────────────────────
      - key: CREDENTIAL_ENCRYPTION_KEY
        value: ""  # ⚠️ Orbitron Secrets에 48자+ random URL-safe string
      # ─────────────────────────────────────────────
      # 수집 건강도 알림 (collection health watch)
      # OWNER_ALERT_PHONE: 사장님 전화번호 국제형식 (82-10-XXXX-XXXX)
      # TELEGRAM_*: 텔레그램 봇 활성화 시 대시보드에서 설정
      # ─────────────────────────────────────────────
      - key: OWNER_ALERT_PHONE
        value: ""  # ⚠️ Orbitron 대시보드에서 설정 (예: 82-10-4173-6570)
      - key: TELEGRAM_BOT_TOKEN
        value: ""  # ⚠️ 텔레그램 봇 토큰 (봇 생성 후 대시보드 설정, 1차 보류)
      - key: TELEGRAM_CHAT_ID
        value: ""  # ⚠️ 텔레그램 chat_id (봇 생성 후 대시보드 설정, 1차 보류)
    healthCheck:
      path: /api/health
      interval: 30
    disk:
      name: sodam-uploads
      mountPath: /app/uploads
      sizeGB: 1

  # ─────────────────────────────────────────────
  # Admin Frontend (Vite + React)
  # ─────────────────────────────────────────────
  - name: sodam-frontend
    type: static
    rootDir: SodamApp/frontend
    build:
      command: "npm install && npm run build"
    publish: ./dist
    env:
      - key: VITE_API_URL
        value: "https://sodamfn.twinverse.org"
      - key: VITE_STAFF_APP_URL
        value: "https://sodam-staff.pages.dev"
      - key: VITE_MEDIA_URL
        value: "http://192.168.219.101:8200"
    routes:
      - source: "/*"
        rewrite: /index.html
    headers:
      # HTML/루트: 항상 서버 재확인 → 새로고침 없이 최신 반영
      - source: "/**"
        headers:
          - key: Cache-Control
            value: "public, max-age=0, must-revalidate"
      # 해시 포함 빌드 산출물: 1년 immutable 캐시
      - source: "/assets/**"
        headers:
          - key: Cache-Control
            value: "public, max-age=31536000, immutable"

# ─────────────────────────────────────────────
# Cron jobs (Task 10 — 자동수집 파이프라인)
# 인증: 기존 CRON_SHARED_SECRET 헤더 방식 (X-Cron-Secret).
# JWT(24h 만료) 회전 부담 없이 영구 작동. easypos/coupang_eats 기존 cron 과 동일 패턴.
# $CRON_SHARED_SECRET / $BACKEND_URL 은 Orbitron 환경에서 주입.
# 시간대: KST (Asia/Seoul) 기준 새벽 03:00 ~ 04:30 슬롯.
# ─────────────────────────────────────────────
crons:
  - name: auto-collection-easypos
    schedule: "0 3 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/easypos'
  - name: auto-collection-coupang
    schedule: "10 3 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/coupang-eats'
  - name: auto-collection-bank
    schedule: "20 3 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/bank-sync'
  - name: auto-collection-orchestrator
    schedule: "30 3 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/orchestrator'
  - name: auto-collection-pl
    schedule: "40 3 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/profit-loss'
  - name: auto-collection-notify
    schedule: "45 3 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/notify'
  - name: auto-collection-settlement-watch
    schedule: "0 4 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/settlement-watch'
  - name: auto-collection-baemin
    schedule: "30 4 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/baemin'
  - name: auto-collection-learn-fee-rates
    schedule: "30 4 * * 0"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/learn-fee-rates'
  # 수집 건강도 점검 + 이상 시 사장님 알림(텔레그램/SMS). 하루 2회 — 새벽 수집(03~04시)
  # 결과가 반영된 뒤 09:00, 그리고 쿠키 만료 12h 임박 창을 놓치지 않도록 21:00 재점검.
  - name: auto-collection-health-watch-morning
    schedule: "0 9 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/health-watch'
  - name: auto-collection-health-watch-evening
    schedule: "0 21 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/health-watch'

# ─────────────────────────────────────────────
# Post-deploy: Staff App → Cloudflare Pages
# 재배포 시 자동으로 직원앱도 함께 빌드/배포
# ─────────────────────────────────────────────
postDeploy:
  - name: deploy-staff-app
    command: |
      cd SodamApp/staff-app
      npm install
      npm run build
      npx wrangler pages deploy dist --project-name sodam-staff --branch main --commit-dirty=true --commit-message="Auto Deploy"
    env:
      - key: VITE_API_URL
        value: "https://sodamfn.twinverse.org"
      - key: VITE_MEDIA_URL
        value: "http://192.168.219.101:8200"

# Database: 로컬 PostgreSQL 직접 연결 (192.168.219.101:5432/sodamfn)
# Orbitron 관리형 DB 대신 기존 PostgreSQL 서버 사용
