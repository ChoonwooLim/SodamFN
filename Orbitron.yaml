# Orbitron Deployment Configuration
# SodamFN Enterprise Management Platform
# Backend (FastAPI) + Admin Frontend (React) + Staff App (Cloudflare Pages)

project:
  name: sodam-fn
  region: ap-northeast-2  # Seoul

services:
  # ─────────────────────────────────────────────
  # Backend API (FastAPI + PostgreSQL)
  # ─────────────────────────────────────────────
  - name: sodam-backend
    type: web
    runtime: python
    rootDir: SodamApp/backend
    build:
      command: "pip install -r requirements.txt"
    start:
      command: "gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --timeout 300 --bind 0.0.0.0:$PORT"
    env:
      - key: DATABASE_URL
        value: "postgresql://devuser:devpass123@192.168.219.101:5432/sodamfn"
      - key: SECRET_KEY
        generate: true
      - key: FRONTEND_URL
        value: "https://sodamfn.twinverse.org"
      - key: STAFF_APP_URL
        value: "https://sodam-staff.pages.dev"
      - key: MEDIA_SERVER_URL
        value: "http://192.168.219.101:8200"
      - key: MEDIA_API_KEY
        value: "sodam-media-2026"
      - key: R2_ACCOUNT_ID
        value: ""  # Set via Orbitron secrets
      - key: R2_ACCESS_KEY_ID
        value: ""  # Set via Orbitron secrets
      - key: R2_SECRET_ACCESS_KEY
        value: ""  # Set via Orbitron secrets
      - key: R2_BUCKET_NAME
        value: "sodam-uploads"
      - key: R2_PUBLIC_URL
        value: ""  # Set after R2 bucket creation
      - key: REPLICATE_API_TOKEN
        value: ""  # Set via Orbitron secrets (Replicate.com API token for AI image generation)
      - key: OPENAI_API_KEY
        value: ""  # Set via Orbitron secrets (OpenAI DALL-E 3 final fallback)
      # Shared AI compute server: twinverse-ai @ 192.168.219.117 (RTX 3090 24GB)
      # See C:\WORK\infra-docs\ai-shared-registry.md for full policy
      - key: AI_GPU_SERVER_URL
        value: "http://192.168.219.117:8100"  # Flux.1-schnell + Real-ESRGAN + rembg + LaMa
      - key: OLLAMA_URL
        value: "http://192.168.219.117:11434"  # Ollama LLM (qwen2.5/mistral/llava)
      - key: TTS_SERVER_URL
        value: "http://192.168.219.117:8101"  # TTS (Edge-TTS / XTTS v2) - reserved
      - key: MUSIC_SERVER_URL
        value: "http://192.168.219.117:8102"  # Music generation (ACE-Step) - reserved
      - key: MEDIA_SERVER_URL
        value: "http://192.168.219.101:8200"  # Central media file server
      - key: MEDIA_API_KEY
        value: "sodam-media-2026"  # Media server API key
      - key: SUPERADMIN_USERNAME
        value: "superadmin"
      - key: SUPERADMIN_PASSWORD
        value: "admin1234"
      # ─────────────────────────────────────────────
      # Popbill FAX (2026-04-24 테스트 환경 연동)
      # SecretKey는 Orbitron Secrets로 설정 — YAML에 실제 값 금지
      # ─────────────────────────────────────────────
      - key: FAX_PROVIDER
        value: "popbill"
      - key: POPBILL_LINK_ID
        value: "SODAM"
      - key: POPBILL_SECRET_KEY
        value: ""  # ⚠️ Orbitron Secrets에 설정
      - key: POPBILL_CORP_NUM
        value: "6391201514"
      - key: POPBILL_SENDER_NUMBER
        value: "0224526570"
      - key: POPBILL_IS_TEST
        value: "true"
      # ─────────────────────────────────────────────
      # Popbill 계좌조회 (EasyFinBank) — 실서비스(정액제)
      # 계좌조회는 팝빌 정액제 결제를 완료한 실서비스이므로 test=false 고정
      # 신한은행 소단(110-357-7XXXXX) 등록, 사용기간 2026-04-24 ~ 2026-05-24
      # ─────────────────────────────────────────────
      - key: POPBILL_BANK_IS_TEST
        value: "false"
      - key: BANK_SYNC_PROVIDER
        value: ""  # 빈값 = 자동(LINK_ID/SECRET_KEY 있으면 popbill, 없으면 stub)
    healthCheck:
      path: /api/health
      interval: 30
    disk:
      name: sodam-uploads
      mountPath: /app/uploads
      sizeGB: 1

  # ─────────────────────────────────────────────
  # Admin Frontend (Vite + React)
  # ─────────────────────────────────────────────
  - name: sodam-frontend
    type: static
    rootDir: SodamApp/frontend
    build:
      command: "npm install && npm run build"
    publish: ./dist
    env:
      - key: VITE_API_URL
        value: "https://sodamfn.twinverse.org"
      - key: VITE_STAFF_APP_URL
        value: "https://sodam-staff.pages.dev"
      - key: VITE_MEDIA_URL
        value: "http://192.168.219.101:8200"
    routes:
      - source: "/*"
        rewrite: /index.html
    headers:
      # HTML/루트: 항상 서버 재확인 → 새로고침 없이 최신 반영
      - source: "/**"
        headers:
          - key: Cache-Control
            value: "public, max-age=0, must-revalidate"
      # 해시 포함 빌드 산출물: 1년 immutable 캐시
      - source: "/assets/**"
        headers:
          - key: Cache-Control
            value: "public, max-age=31536000, immutable"

# ─────────────────────────────────────────────
# Post-deploy: Staff App → Cloudflare Pages
# 재배포 시 자동으로 직원앱도 함께 빌드/배포
# ─────────────────────────────────────────────
postDeploy:
  - name: deploy-staff-app
    command: |
      cd SodamApp/staff-app
      npm install
      npm run build
      npx wrangler pages deploy dist --project-name sodam-staff --branch main --commit-dirty=true --commit-message="Auto Deploy"
    env:
      - key: VITE_API_URL
        value: "https://sodamfn.twinverse.org"
      - key: VITE_MEDIA_URL
        value: "http://192.168.219.101:8200"

# Database: 로컬 PostgreSQL 직접 연결 (192.168.219.101:5432/sodamfn)
# Orbitron 관리형 DB 대신 기존 PostgreSQL 서버 사용
