    rootDir: SodamApp/frontend
    build:
      command: "npm install && npm run build"
    publish: ./dist
    env:
      - key: VITE_API_URL
        value: "https://sodamfn.twinverse.org"
      - key: VITE_STAFF_APP_URL
        value: "https://sodam-staff.pages.dev"
      - key: VITE_MEDIA_URL
        value: "http://192.168.219.101:8200"
    routes:
      - source: "/*"
        rewrite: /index.html
    headers:
      # HTML/лЈЁнҠё: н•ӯмғҒ м„ңлІ„ мһ¬нҷ•мқё вҶ’ мғҲлЎңкі м№Ё м—Ҷмқҙ мөңмӢ  л°ҳмҳҒ
      - source: "/**"
        headers:
          - key: Cache-Control
            value: "public, max-age=0, must-revalidate"
      # н•ҙмӢң нҸ¬н•Ё л№Ңл“ң мӮ°м¶ңл¬ј: 1л…„ immutable мәҗмӢң
      - source: "/assets/**"
        headers:
          - key: Cache-Control
            value: "public, max-age=31536000, immutable"

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Cron jobs (Task 10 вҖ” мһҗлҸҷмҲҳм§‘ нҢҢмқҙн”„лқјмқё)
# мқёмҰқ: кё°мЎҙ CRON_SHARED_SECRET н—ӨлҚ” л°©мӢқ (X-Cron-Secret).
# JWT(24h л§ҢлЈҢ) нҡҢм „ л¶ҖлӢҙ м—Ҷмқҙ мҳҒкө¬ мһ‘лҸҷ. easypos/coupang_eats кё°мЎҙ cron кіј лҸҷмқј нҢЁн„ҙ.
# $CRON_SHARED_SECRET / $BACKEND_URL мқҖ Orbitron нҷҳкІҪм—җм„ң мЈјмһ….
# мӢңк°„лҢҖ: KST (Asia/Seoul) кё°мӨҖ мғҲлІҪ 03:00 ~ 04:30 мҠ¬лЎҜ.
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
crons:
  - name: auto-collection-easypos
    schedule: "0 3 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/easypos'
  - name: auto-collection-coupang
    schedule: "10 3 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/coupang-eats'
  - name: auto-collection-bank
    schedule: "20 3 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/bank-sync'
  - name: auto-collection-orchestrator
    schedule: "30 3 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/orchestrator'
  - name: auto-collection-pl
    schedule: "40 3 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/profit-loss'
  - name: auto-collection-notify
    schedule: "45 3 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/notify'
  - name: auto-collection-settlement-watch
    schedule: "0 4 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/settlement-watch'
  - name: auto-collection-baemin
    schedule: "30 4 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/baemin'
  - name: auto-collection-learn-fee-rates
    schedule: "30 4 * * 0"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/learn-fee-rates'
  # мҲҳм§‘ кұҙк°•лҸ„ м җкІҖ + мқҙмғҒ мӢң мӮ¬мһҘлӢҳ м•ҢлҰј(н…”л Ҳк·ёлһЁ/SMS). н•ҳлЈЁ 2нҡҢ вҖ” мғҲлІҪ мҲҳм§‘(03~04мӢң)
  # кІ°кіјк°Җ л°ҳмҳҒлҗң л’Ө 09:00, к·ёлҰ¬кі  мҝ нӮӨ л§ҢлЈҢ 12h мһ„л°• м°Ҫмқ„ лҶ“м№ҳм§Җ м•ҠлҸ„лЎқ 21:00 мһ¬м җкІҖ.
  - name: auto-collection-health-watch-morning
    schedule: "0 9 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/health-watch'
  - name: auto-collection-health-watch-evening
    schedule: "0 21 * * *"
    command: 'curl -fsS -X POST -H "X-Cron-Secret: $CRON_SHARED_SECRET" $BACKEND_URL/api/auto-collection/cron/health-watch'

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Post-deploy: Staff App вҶ’ Cloudflare Pages
# мһ¬л°°нҸ¬ мӢң мһҗлҸҷмңјлЎң м§Ғмӣҗм•ұлҸ„ н•Ёк»ҳ л№Ңл“ң/л°°нҸ¬
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
postDeploy:
  - name: deploy-staff-app
    command: |
      cd SodamApp/staff-app
      npm install
      npm run build
      npx wrangler pages deploy dist --project-name sodam-staff --branch main --commit-dirty=true --commit-message="Auto Deploy"
    env:
      - key: VITE_API_URL
        value: "https://sodamfn.twinverse.org"
      - key: VITE_MEDIA_URL
        value: "http://192.168.219.101:8200"

